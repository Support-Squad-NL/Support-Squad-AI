services:
  supportsquadai-gateway:
    image: ${SUPPORTSQUADAI_IMAGE:-supportsquadai:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      SUPPORTSQUADAI_GATEWAY_TOKEN: ${SUPPORTSQUADAI_GATEWAY_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${SUPPORTSQUADAI_CONFIG_DIR}:/home/node/.supportsquadai
      - ${SUPPORTSQUADAI_WORKSPACE_DIR}:/home/node/.supportsquadai/workspace
    ports:
      - "${SUPPORTSQUADAI_GATEWAY_PORT:-18789}:18789"
      - "${SUPPORTSQUADAI_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${SUPPORTSQUADAI_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  supportsquadai-cli:
    image: ${SUPPORTSQUADAI_IMAGE:-supportsquadai:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      SUPPORTSQUADAI_GATEWAY_TOKEN: ${SUPPORTSQUADAI_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${SUPPORTSQUADAI_CONFIG_DIR}:/home/node/.supportsquadai
      - ${SUPPORTSQUADAI_WORKSPACE_DIR}:/home/node/.supportsquadai/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
