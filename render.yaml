services:
  - type: web
    name: supportsquadai
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: SUPPORTSQUADAI_STATE_DIR
        value: /data/.supportsquadai
      - key: SUPPORTSQUADAI_WORKSPACE_DIR
        value: /data/workspace
      - key: SUPPORTSQUADAI_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: supportsquadai-data
      mountPath: /data
      sizeGB: 1
